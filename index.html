<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архитектурный гид по Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./images/bg1.png');
            background-size: cover;
            background-position: center;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transition: background-image 1s ease-in-out;
        }

        .container {
            opacity: 0; 
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
            
            /* Остальные ваши стили остаются без изменений */
            width: 90%; /* чтобы на мобильных был отступ по бокам */
            max-width: 800px;
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.12);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);

            /* Защита от обрезки текста */
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        /* Класс, который мы добавим через JS для показа */
        .container.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Декоративные элементы */
        .decoration {
            position: fixed;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            font-size: 180px;
            filter: blur(1px);
        }

        .decoration.visible {
            opacity: 0.12; /* Возвращаем исходную прозрачность */
        }

        .decoration-left {
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .decoration-right {
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            margin-bottom: 25px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.5em;
            margin-bottom: 35px;
            opacity: 0.95;
            font-weight: 300;
        }

        .about {
            font-size: 1.15em;
            margin-bottom: 45px;
            line-height: 1.7;
            opacity: 0.9;
        }
        
        .btn-nav {
            padding: 12px 24px;
            font-size: 1em;
            font-family: 'Cormorant Garamond', serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .btn-archive-link {
            background: #6c757d;
            color: white;
        }

        .btn-archive-link:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        /* Подсветка секции архива при переходе по якорю */
        .highlight-archive {
            animation: pulse-highlight 2s ease-out;
        }

        @keyframes pulse-highlight {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .btn-test {
            display: inline-block;
            padding: 20px 55px;
            font-size: 1.35em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .btn-test:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        /* Индикатор слайд-шоу */
        .slide-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            opacity: 0; /* Скрываем индикатор тоже */
        }

        .slide-indicator.visible {
            opacity: 1;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: rgba(255,255,255,0.9);
            transform: scale(1.3);
        }

        @media (max-width: 480px) {
            h1 {  font-size: clamp(1.3rem, 4vw, 3rem);}
            .subtitle { font-size: clamp(1rem, 2.5vw, 1.5rem); }
            .btn-test { padding: 16px 40px; font-size: 1.1em; }
            .decoration { display: none; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Декоративные элементы -->
    <div class="decoration decoration-left">🏛️</div>
    <div class="decoration decoration-right">🏛️</div>

    <div class="container">
        <h1>Архитектурный гид по Петербургу</h1>
        <p class="subtitle">Пройдите тест и узнайте свой архитектурный стиль</p>
        <p class="about">
            Откройте для себя уникальную архитектуру Санкт-Петербурга через персонализированный тест. 
            Узнайте, какой стиль вам ближе — сталинский ампир, классицизм, модерн или конструктивизм.
        </p>
        <a href="test.html" class="btn-test">🎯 Пройти тест</a>
        <a href="result.html#archive-section" class="btn-nav btn-archive-link" style="text-decoration: none; display: inline-block;">
    📚 Мои маршруты
</a>
        </div>

    <!-- Индикатор слайд-шоу -->
    <div class="slide-indicator">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>

    <script>
        window.addEventListener('load', function() {
            // Задержка в миллисекундах (например, 600 мс = 0.8 секунды)
            const delay = 4700; 

            setTimeout(function() {
                // 1. Показываем основной контейнер с текстом
                const mainContainer = document.querySelector('.container');
                if (mainContainer) {
                    mainContainer.classList.add('visible');
                }
                
                // 2. Показываем декоративные элементы (колонны)
                const decorations = document.querySelectorAll('.decoration');
                decorations.forEach(el => el.classList.add('visible'));
                
                // 3. Показываем индикатор слайдов (точки внизу)
                const indicator = document.querySelector('.slide-indicator');
                if (indicator) {
                    indicator.classList.add('visible');
                }
            }, delay);
        });
        // Слайд-шоу
        const backgrounds = [
            'asserts/images/bg1.png',
            'asserts/images/bg2.png',
            'asserts/images/bg3.png'
        ];

        let currentIndex = 0;
        const dots = document.querySelectorAll('.dot');

        function updateDots() {
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function changeBackground() {
            currentIndex = (currentIndex + 1) % backgrounds.length;
            document.body.style.backgroundImage = 
                `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${backgrounds[currentIndex]}')`;
            updateDots();
        }

        function goToSlide(index) {
            currentIndex = index;
            document.body.style.backgroundImage = 
                `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${backgrounds[currentIndex]}')`;
            updateDots();
        }

        // Автопереключение каждые  секунд
        setInterval(changeBackground, 6000);
    </script>

</body>
</html>
