<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архитектурный гид по Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./images/bg1.png');
            background-size: cover;
            background-position: center;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            transition: background-image 1s ease-in-out;
        }

        /* Декоративные элементы */
        .decoration {
            position: fixed;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            font-size: 180px;
            filter: blur(1px);
        }

        .decoration-left {
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .decoration-right {
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .container {
            max-width: 800px;
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.12);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            margin-bottom: 25px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.5em;
            margin-bottom: 35px;
            opacity: 0.95;
            font-weight: 300;
        }

        .about {
            font-size: 1.15em;
            margin-bottom: 45px;
            line-height: 1.7;
            opacity: 0.9;
        }

        .btn-test {
            display: inline-block;
            padding: 20px 55px;
            font-size: 1.35em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .btn-test:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        /* Индикатор слайд-шоу */
        .slide-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: rgba(255,255,255,0.9);
            transform: scale(1.3);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2em; }
            .subtitle { font-size: 1.1em; }
            .btn-test { padding: 16px 40px; font-size: 1.1em; }
            .decoration { display: none; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Декоративные элементы -->
    <div class="decoration decoration-left">🏛️</div>
    <div class="decoration decoration-right">🏛️</div>

    <div class="container">
        <h1>Архитектурный гид по Петербургу</h1>
        <p class="subtitle">Пройдите тест и узнайте свой архитектурный стиль</p>
        <p class="about">
            Откройте для себя уникальную архитектуру Санкт-Петербурга через персонализированный тест. 
            Узнайте, какой стиль вам ближе — сталинский ампир, классицизм, модерн или конструктивизм.
        </p>
        <a href="test.html" class="btn-test">🎯 Пройти тест</a>
    </div>

    <!-- Индикатор слайд-шоу -->
    <div class="slide-indicator">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>

    <script>
        // Слайд-шоу
        const backgrounds = [
            './images/bg1.png',
            './images/bg2.png',
            './images/bg3.png'
        ];

        let currentIndex = 0;
        const dots = document.querySelectorAll('.dot');

        function updateDots() {
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function changeBackground() {
            currentIndex = (currentIndex + 1) % backgrounds.length;
            document.body.style.backgroundImage = 
                `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${backgrounds[currentIndex]}')`;
            updateDots();
        }

        function goToSlide(index) {
            currentIndex = index;
            document.body.style.backgroundImage = 
                `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${backgrounds[currentIndex]}')`;
            updateDots();
        }

        // Автопереключение каждые 6 секунд
        setInterval(changeBackground, 6000);
    </script>

</body>
</html>
