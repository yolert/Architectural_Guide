<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест — Архитектурный гид по Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./images/bg1.jpg');
            background-size: cover;
            background-position: center;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-image 1s ease-in-out;
        }

        .test-container {
            max-width: 750px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        /* Прогресс текст */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            font-size: 1.2em;
            color: #555;
            font-weight: 600;
        }

        .progress-arrow {
            color: #667eea;
            font-size: 1.5em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Вопрос */
        .question {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 40px;
            line-height: 1.3;
            text-align: center;
        }

        /* Варианты ответов */
        .options {
            margin-bottom: 50px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 20px 25px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.15em;
            line-height: 1.4;
        }

        .option:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .option input[type="radio"] {
            display: none;
        }

        .custom-radio {
            width: 24px;
            height: 24px;
            border: 3px solid #adb5bd;
            border-radius: 50%;
            margin-right: 15px;
            position: relative;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .option.selected .custom-radio {
            border-color: white;
            background: white;
        }

        .option.selected .custom-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
        }

        /* Кнопки навигации */
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .btn {
            flex: 1;
            padding: 18px 30px;
            font-size: 1.1em;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-back {
            background: #ffcdd2;
            color: #c62828;
            border: 2px solid #ef9a9a;
        }

        .btn-back:hover:not(:disabled) {
            background: #ef9a9a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid transparent;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-back:disabled {
            background: #f5f5f5;
            color: #999;
            border-color: #ddd;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .test-container {
                padding: 35px 25px;
            }

            .question {
                font-size: 1.6em;
            }

            .option {
                font-size: 1.05em;
                padding: 15px 20px;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Анимация появления вопроса */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Страница результатов */
        .result-container {
            display: none;
            text-align: center;
        }

        .result-style {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            color: #2c3e50;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-description {
            font-size: 1.3em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .result-route {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }

        .result-route h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .result-route p {
            font-size: 1.1em;
            color: #555;
            line-height: 1.5;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 50px;
            font-size: 1.2em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>

                description: "Ваш выбор — красота и поэзия! Вас привлекают плавные линии, декоративность и романтическое настроение. Сегодня вам нужен Петербург, который вдохновляет и очаровывает деталями.",
                routes: {
                    "long": "Маршрут по модерну (3-4 часа): Улица Рубинштейна, Литейный проспект, особняки в стиле модерн, витражи и декор. Романтический Петербург Серебряного века.",
                    "medium-long": "Модерн Петербурга (2.5 часа): Основные улицы с архитектурой модерна.",
                    "medium": "Экспресс-модерн (1.5 часа): Улица Рубинштейна и окрестности.",
                    "short": "Быстрый модерн (1 час): Главные особняки в стиле модерн."
                }
            },
            constructivism: {
                description: "Ваш выбор — функциональность и геометрия! Вас привлекают чистые формы, минимализм и современные решения. Сегодня вам нужен Петербург, который удивляет смелостью идей.",
                routes: {
                    "long": "Маршрут по конструктивизму (3-4 часа): Нарвская застава, Московские ворота, проспект Стачек, жилмассивы 1920-30-х годов. Авангардный Петербург.",
                    "medium-long": "Конструктивизм (2.5 часа): Московский район, Нарвская застава, ключевые объекты.",
                    "medium": "Экспресс-конструктивизм (1.5 часа): Основные объекты конструктивизма.",
                    "short": "Быстрый конструктивизм (1 час): Главные символы авангарда."
                }
            }
        };

        // ===== СОСТОЯНИЕ ТЕСТА =====
        let currentQuestion = 0;
        let answers = {};
        let scores = {
            stalin: 0,
            classicism: 0,
            modern: 0,
            constructivism: 0
        };

        // ===== ЭЛЕМЕНТЫ DOM =====
        const progressFill = document.getElementById('progress-fill');
        const currentQuestionEl = document.getElementById('current-question');
        const totalQuestionsEl = document.getElementById('total-questions');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const btnBack = document.getElementById('btn-back');
        const btnNext = document.getElementById('btn-next');
        const questionContainer = document.getElementById('question-container');
        const resultContainer = document.getElementById('result-container');

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        totalQuestionsEl.textContent = questions.length;
        loadQuestion(0);

        // ===== ЗАГРУЗКА ВОПРОСА =====
        function loadQuestion(index) {
            const question = questions[index];
            
            // Обновляем прогресс
            const progress = ((index + 1) / questions.length) * 100;
            progressFill.style.width = progress + '%';
            currentQuestionEl.textContent = index + 1;

            // Обновляем текст вопроса с анимацией
            questionTextEl.classList.remove('fade-in');
            void questionTextEl.offsetWidth; // триггер перерисовки
            questionTextEl.textContent = question.text;
            questionTextEl.classList.add('fade-in');

            // Создаем варианты ответов
            optionsContainer.innerHTML = '';
            question.options.forEach((option, optIndex) => {
                const optionEl = createOptionElement(option, optIndex);
                optionsContainer.appendChild(optionEl);
            });

            // Восстанавливаем выбранный ответ, если есть
            if (answers[index] !== undefined) {
                const selectedOption = optionsContainer.children[answers[index]];
                if (selectedOption) {
                    selectedOption.classList.add('selected');
                }
            }

            // Обновляем кнопки
            updateButtons();
        }

        // ===== СОЗДАНИЕ ЭЛЕМЕНТА ВАРИАНТА ОТВЕТА =====
        function createOptionElement(option, index) {
            const label = document.createElement('label');
            label.className = 'option';
            label.innerHTML = `
                <input type="radio" name="answer" value="${index}">
                <span class="custom-radio"></span>
                <span>${option.text}</span>
            `;

            // Обработчик клика
            label.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Убираем выделение со всех вариантов
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                
                // Выделяем текущий
                this.classList.add('selected');
                
                // Сохраняем ответ
                answers[currentQuestion] = index;
                
                // Обновляем кнопки
                updateButtons();
            });

            return label;
        }

        // ===== ОБНОВЛЕНИЕ СОСТОЯНИЯ КНОПОК =====
        function updateButtons() {
            const hasAnswer = answers[currentQuestion] !== undefined;
            
            // Кнопка "Далее" активна только если есть ответ
            btnNext.disabled = !hasAnswer;
            
            // Кнопка "Назад" активна, если это не первый вопрос
            btnBack.disabled = currentQuestion === 0;
        }

        // ===== ОБРАБОТЧИКИ КНОПОК =====
        btnBack.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
            }
        });

        btnNext.addEventListener('click', () => {
            if (answers[currentQuestion] !== undefined) {
                // Сохраняем баллы
                const selectedOption = questions[currentQuestion].options[answers[currentQuestion]];
                scores[selectedOption.style]++;

                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    loadQuestion(currentQuestion);
                } else {
                    // Показываем результаты
                    showResults();
                }
            }
        });

        // ===== ПОДСЧЁТ РЕЗУЛЬТАТОВ =====
        function calculateResult() {
            // Находим стиль с максимальным количеством баллов
            let maxScore = 0;
            let resultStyle = 'stalin';

            for (const [style, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    resultStyle = style;
                }
            }

            // Определяем время из вопроса 10
            const timeAnswer = answers[9]; // Вопрос 10 (индекс 9)
            let timeCategory = 'medium';
            
            if (timeAnswer === 0) timeCategory = 'long';
            else if (timeAnswer === 1) timeCategory = 'medium-long';
            else if (timeAnswer === 2) timeCategory = 'medium';
            else if (timeAnswer === 3) timeCategory = 'short';

            return {
                style: resultStyle,
                time: timeCategory
            };
        }

        // ===== ПОКАЗ РЕЗУЛЬТАТОВ =====
        function showResults() {
            const result = calculateResult();
            window.location.href = `result.html?style=${result.style}&time=${result.time}`;
        }

        // ===== ОТПРАВКА РЕЗУЛЬТАТОВ (заглушка) =====
        function sendResultsToServer(result) {
            // TODO: Отправить данные на сервер
            console.log('Результат теста:', result);
            console.log('Ответы:', answers);
            console.log('Баллы:', scores);

                    answers: answers,
                    scores: scores,
                    timestamp: new Date().toISOString()
                })
            });
            */
        }
    </script>
