<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест — Архитектурный гид по Петербургу</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('./images/bg1.png');
            background-size: cover;
            background-position: center;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-image 1s ease-in-out;
        }

        .test-container {
            max-width: 700px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Прогресс */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            font-size: 1.2em;
            color: #555;
            font-weight: 600;
        }

        .progress-arrow {
            color: #667eea;
            font-size: 1.5em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Вопрос */
        .question {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 40px;
            line-height: 1.3;
            text-align: center;
        }

        /* Варианты ответов */
        .options {
            margin-bottom: 50px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
        }

        .option:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .option input[type="radio"] {
            display: none;
        }

        .custom-radio {
            width: 24px;
            height: 24px;
            border: 3px solid #adb5bd;
            border-radius: 50%;
            margin-right: 15px;
            position: relative;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .option.selected .custom-radio {
            border-color: white;
            background: white;
        }

        .option.selected .custom-radio::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
        }

        /* Кнопки навигации */
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .btn {
            flex: 1;
            padding: 18px 30px;
            font-size: 1.1em;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-back {
            background: #ffcdd2;
            color: #c62828;
            border: 2px solid #ef9a9a;
        }

        .btn-back:hover:not(:disabled) {
            background: #ef9a9a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid transparent;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-back:disabled {
            background: #f5f5f5;
            color: #999;
            border-color: #ddd;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .test-container {
                padding: 35px 25px;
            }

            .question {
                font-size: 1.6em;
            }

            .option {
                font-size: 1.1em;
                padding: 15px 20px;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Анимация появления вопроса */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="test-container">
        <!-- Прогресс -->
        <div class="progress-header">
            <span>Вопрос <span id="current-question">3</span> из <span id="total-questions">10</span></span>
            <span class="progress-arrow">===></span>
        </div>

        <!-- Вопрос -->
        <div class="question fade-in" id="question-text">
            Вам нравятся плавные линии?
        </div>

        <!-- Варианты ответов -->
        <div class="options" id="options-container">
            <label class="option">
                <input type="radio" name="answer" value="yes">
                <span class="custom-radio"></span>
                <span>Да</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="no">
                <span class="custom-radio"></span>
                <span>Нет</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="sometimes">
                <span class="custom-radio"></span>
                <span>Иногда</span>
            </label>
        </div>

        <!-- Кнопки навигации -->
        <div class="navigation">
            <button class="btn btn-back" id="btn-back" disabled>
                ← Назад
            </button>
            <button class="btn btn-next" id="btn-next" disabled>
                Далее →
            </button>
        </div>
    </div>

    <script>
        // ===== ЗАГЛУШКИ ДЛЯ ДАННЫХ (потом заменит другой разработчик) =====
        const testData = {
            currentQuestion: 3,
            totalQuestions: 10,
            questions: [
                { id: 1, text: "Вам нравятся плавные линии?", options: ["Да", "Нет", "Иногда"] },
                { id: 2, text: "Какой цвет вам ближе?", options: ["Пастельные тона", "Яркие цвета", "Монохром"] },
                // ... остальные вопросы
            ],
            answers: {} // здесь будут храниться ответы
        };

        // ===== ЭЛЕМЕНТЫ DOM =====
        const currentQuestionEl = document.getElementById('current-question');
        const totalQuestionsEl = document.getElementById('total-questions');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const btnBack = document.getElementById('btn-back');
        const btnNext = document.getElementById('btn-next');

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            currentQuestionEl.textContent = testData.currentQuestion;
            totalQuestionsEl.textContent = testData.totalQuestions;
            loadQuestion(testData.currentQuestion);
        }

        // ===== ЗАГРУЗКА ВОПРОСА =====
        function loadQuestion(questionNumber) {
            const question = testData.questions.find(q => q.id === questionNumber);
            if (!question) return;

            // Обновляем текст вопроса с анимацией
            questionTextEl.classList.remove('fade-in');
            void questionTextEl.offsetWidth; // триггер перерисовки
            questionTextEl.textContent = question.text;
            questionTextEl.classList.add('fade-in');

            // Создаем варианты ответов
            optionsContainer.innerHTML = '';
            question.options.forEach((optionText, index) => {
                const optionValues = ['yes', 'no', 'sometimes'];
                const option = createOptionElement(optionText, optionValues[index]);
                optionsContainer.appendChild(option);
            });

            // Восстанавливаем выбранный ответ, если есть
            if (testData.answers[questionNumber]) {
                const selectedRadio = document.querySelector(`input[value="${testData.answers[questionNumber]}"]`);
                if (selectedRadio) {
                    selectedRadio.checked = true;
                    selectedRadio.parentElement.classList.add('selected');
                    updateButtons();
                }
            }

            // Обновляем состояние кнопок
            updateButtons();
        }

        // ===== СОЗДАНИЕ ЭЛЕМЕНТА ВАРИАНТА ОТВЕТА =====
        function createOptionElement(text, value) {
            const label = document.createElement('label');
            label.className = 'option';
            label.innerHTML = `
                <input type="radio" name="answer" value="${value}">
                <span class="custom-radio"></span>
                <span>${text}</span>
            `;

            // Обработчик клика
            label.addEventListener('click', function() {
                // Убираем выделение со всех вариантов
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                // Выделяем текущий
                this.classList.add('selected');
                // Сохраняем ответ
                testData.answers[testData.currentQuestion] = value;
                // Обновляем кнопки
                updateButtons();
            });

            return label;
        }

        // ===== ОБНОВЛЕНИЕ СОСТОЯНИЯ КНОПОК =====
        function updateButtons() {
            const hasAnswer = testData.answers[testData.currentQuestion];
            
            // Кнопка "Далее" активна только если есть ответ
            btnNext.disabled = !hasAnswer;
            
            // Кнопка "Назад" активна, если это не первый вопрос
            btnBack.disabled = testData.currentQuestion === 1;
        }

        // ===== ОБРАБОТЧИКИ КНОПОК =====
        btnBack.addEventListener('click', () => {
            if (testData.currentQuestion > 1) {
                testData.currentQuestion--;
                init();
            }
        });

        btnNext.addEventListener('click', () => {
            if (testData.answers[testData.currentQuestion] && testData.currentQuestion < testData.totalQuestions) {
                testData.currentQuestion++;
                init();
            } else if (testData.currentQuestion === testData.totalQuestions) {
                // Последний вопрос — показываем результаты
                alert('Тест завершен! Здесь будет страница с результатами.');
                // window.location.href = '/result.html';
            }
        });

        // Запускаем
        init();
    </script>

</body>
</html>
